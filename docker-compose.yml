version: "3.9"

services:
  db:
    image: postgres:15-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  api:
    build: ./api
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  scraper:
    build: ./scraper
    env_file: .env
    depends_on:
      - db

  web:
    build: ./web
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
